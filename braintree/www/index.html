<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.iaptic.com https://*.braintreegateway.com https://*.braintree-api.com 'unsafe-eval' 'unsafe-inline' gap:; style-src 'self' 'unsafe-inline'">
  <style>
    body { font-family: -apple-system, sans-serif; margin: 20px; margin-top: 50px; background: white; }
    #error { background-color: #ff0; padding: 4px; min-height: 1em; }
    #status { margin: 20px 0; font-size: 18px; }
    button { padding: 12px 24px; margin-top: 10px; font-size: 16px; display: block; }
    .cart { border: 1px solid #ccc; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .cart-item { display: flex; justify-content: space-between; padding: 4px 0; }
    .cart-total { border-top: 1px solid #ccc; margin-top: 8px; padding-top: 8px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Braintree Example</h1>

  <!-- Error display -->
  <div id="error"></div>

  <!-- Status message -->
  <div id="status"></div>

  <!-- Shopping cart -->
  <div class="cart">
    <h3>Your Cart</h3>
    <div class="cart-item"><span>Widget Pro</span><span>$1.49</span></div>
    <div class="cart-item"><span>Gadget Plus</span><span>$2.99</span></div>
    <div class="cart-total"><span>Total</span><span>$4.48</span></div>
  </div>

  <!-- Pay button -->
  <button onclick="launchBraintreePayment()">Pay with Braintree</button>

  <script type="text/javascript" src="cordova.js"></script>
  <script type="text/javascript" src="js/index.js"></script>
</body>
</html>

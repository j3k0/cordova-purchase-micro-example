<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.iaptic.com 'unsafe-eval' 'unsafe-inline' gap:; style-src 'self' 'unsafe-inline'">
  <style>
    body { font-family: -apple-system, sans-serif; margin: 20px; margin-top: 50px; background: white; }
    #error { background-color: #ff0; padding: 4px; min-height: 1em; }
    button { padding: 10px; margin-top: 10px; }
    h3 { margin-bottom: 4px; }
    #tokens { font-size: 24px; font-weight: bold; margin: 16px 0; }
    #status { color: #555; margin: 8px 0; min-height: 1.2em; }
</style>
</head>
<body>
  <h1>Consumables Example</h1>

  <!-- Token counter -->
  <div id="tokens"></div>

  <!-- Purchase status -->
  <div id="status"></div>

  <!-- Error display -->
  <div id="error"></div>

  <!-- Product listing (populated dynamically) -->
  <div id="products"></div>

  <!-- Restore purchases -->
  <button onclick="restorePurchases()">Restore Purchases</button>

  <!-- Storefront information -->
  <div id="storefront"></div>

<script type="text/javascript" src="cordova.js"></script>
  <script type="text/javascript" src="js/env.js"></script>
  <script type="text/javascript" src="js/index.js"></script>
</body>
</html>
